name: Daily Remote Job Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v3

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 运行爬虫脚本
        run: python job_filter.py

      - name: 📁 收集生成的 CSV 表格
        uses: actions/upload-artifact@v4
        with:
          name: daily-job-list
          path: '*.csv'
          
      # -------- 以下是新增的发邮件模块 --------
      - name: 📧 发送邮件附件
        uses: dawidd6/action-send-mail@v3
        with:
          # 以下是以 QQ 邮箱为例的服务器。
          # 如果你用 163 邮箱，改成 smtp.163.com
          # 如果你用 Gmail，改成 smtp.gmail.com
          server_address: smtp.qq.com 
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 🚀 你的今日远程工作清单已送达！
          # 发送给谁（直接发给你自己）
          to: ${{ secrets.MAIL_USERNAME }}
          from: Remote Job Bot
          body: |
            你好！
            
            这是由 GitHub Actions 自动为你抓取并筛选的最新远程工作清单。
            请查收附件！
            
            祝找工作顺利！
          # 自动抓取当前目录下所有生成的 csv 文件作为附件
          attachments: ./*.csv
